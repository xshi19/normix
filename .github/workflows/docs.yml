name: Docs

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          version: "latest"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Install docs dependencies
        run: |
          uv sync --extra docs --extra plotting
          uv pip install pandas ipykernel

      - name: Cross-link invariants
        run: bash scripts/check_doc_links.sh

      - name: Structural docs/ invariant
        run: |
          test -z "$(find docs -type d \( -name plans -o -name investigations \
            -o -name reviews -o -name tech_notes -o -name archive \
            -o -name references \) -print)"

      # The myst-nb execution cache is keyed only on notebook cell source, so a
      # fix to library source (normix/**) does NOT invalidate cached outputs.
      # Include normix/** in both the primary key and the restore-key prefix so
      # a library change forces a full re-execution and never restores outputs
      # produced by a different version of the library (which would republish
      # stale figures — see docs-publish skill "Gotchas").
      - name: Restore myst-nb cache
        uses: actions/cache@v4
        with:
          path: docs/_build/.jupyter_cache
          key: myst-nb-${{ runner.os }}-${{ hashFiles('normix/**') }}-${{ hashFiles('docs/tutorials/**', 'uv.lock', 'pyproject.toml') }}
          restore-keys: |
            myst-nb-${{ runner.os }}-${{ hashFiles('normix/**') }}-

      - name: Build Sphinx HTML
        run: |
          uv run sphinx-build -b html docs docs/_build/html
          touch docs/_build/html/.nojekyll

      - name: Link check (report only)
        if: always()
        continue-on-error: true
        run: uv run sphinx-build -b linkcheck docs docs/_build/linkcheck

      - name: Deploy to gh-pages
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/_build/html
